<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaiVedha - Admin Login</title>
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔒%3C/text%3E%3C/svg%3E">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Outfit:wght@300;400;500;700&display=swap');

    :root {
      --bg-color: #050b14;
      --card-bg: rgba(16, 29, 66, 0.65);
      --primary-color: #e5c583; /* Champagne Gold */
      --accent-color: #e0e1dd; /* Soft Silver */
      --text-light: #ffffff;
      --text-muted: #8a99ad;
    }
    
    body {
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 10%, rgba(229, 197, 131, 0.08) 0%, transparent 60%);
      color: var(--text-light);
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    
    .navbar-admin {
      border-bottom: 1px solid rgba(229, 197, 131, 0.2);
      background: rgba(5, 11, 20, 0.85) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    .logo-text {
      font-family: 'Cinzel', serif;
      color: var(--text-light) !important;
      font-weight: 800;
      letter-spacing: 2px;
    }
    
    .logo-subtext {
      color: var(--primary-color);
      font-size: 0.65rem;
      letter-spacing: 3px;
      font-weight: 700;
    }
    
    .admin-card {
      background: var(--card-bg);
      border: 1px solid rgba(229, 197, 131, 0.15);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    
    .admin-card:hover {
      border-color: var(--primary-color);
      transform: translateY(-2px);
      box-shadow: 0 16px 45px rgba(229, 197, 131, 0.1);
    }
    
    .btn-gold {
      background: linear-gradient(135deg, #e5c583 0%, #b8972c 100%);
      color: #050b14 !important;
      font-weight: 700;
      border: none;
      transition: all 0.3s;
      border-radius: 8px;
    }
    
    .btn-gold:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(229, 197, 131, 0.45);
    }

    .btn-outline-gold {
      background: transparent;
      color: var(--primary-color) !important;
      border: 1.5px solid var(--primary-color);
      font-weight: 600;
      transition: all 0.3s;
      border-radius: 8px;
    }
    .btn-outline-gold:hover {
      background: var(--primary-color);
      color: #050b14 !important;
      box-shadow: 0 6px 15px rgba(229, 197, 131, 0.25);
    }
    
    .form-control-admin {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-light);
      border-radius: 8px;
      padding: 10px 14px;
      transition: all 0.3s;
    }
    
    .form-control-admin:focus {
      background: rgba(0, 0, 0, 0.6);
      border-color: var(--primary-color);
      color: var(--text-light);
      box-shadow: 0 0 0 3px rgba(229, 197, 131, 0.2);
    }
    
    /* Login Page Styling */
    .login-container {
      max-width: 440px;
      margin-top: 12vh;
      animation: fadeInUp 0.8s ease-out;
    }
    
    /* Pulsing Active Indicator */
    .active-badge {
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 50px;
      background: rgba(40, 167, 69, 0.12);
      color: #2ec4b6;
      border: 1px solid rgba(40, 167, 69, 0.25);
    }
    
    /* Table Styling */
    .table-luxury {
      color: var(--text-light);
      border-collapse: separate;
      border-spacing: 0 10px;
    }
    
    .table-luxury tr {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      transition: transform 0.2s, background-color 0.2s;
    }
    
    .table-luxury th {
      border: none;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 14px 12px;
    }
    
    .table-luxury td {
      border: none;
      padding: 16px 12px;
      vertical-align: middle;
    }
    
    .table-luxury tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: scale(1.003);
    }

    /* Tabs Styling */
    .dashboard-tabs {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 25px;
    }
    .tab-btn {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
      text-decoration: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab-btn:hover {
      background: rgba(229, 197, 131, 0.1);
      color: var(--primary-color);
      border-color: rgba(229, 197, 131, 0.3);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #e5c583 0%, #b8972c 100%);
      color: #050b14 !important;
      border-color: var(--primary-color);
      box-shadow: 0 4px 15px rgba(229, 197, 131, 0.3);
    }
    
    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(229, 197, 131, 0.25);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(229, 197, 131, 0.45);
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .animate-fade-in {
      animation: fadeInUp 0.6s ease-out;
    }
  </style>

</head>
<body>
  <div class="container py-5">
    <div id="loginSection" class="mx-auto login-container">
      <div class="admin-card p-5">
        <div class="text-center mb-4">
          <span class="fs-1">🔒</span>
          <h2 class="fw-bold mt-2" style="font-family: Georgia, serif;">Showroom Portal</h2>
          <p class="text-muted" style="font-size: 0.85rem;">Authenticate to manage rates and logs</p>
        </div>
        
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">USERNAME</label>
            <input type="text" class="form-control form-control-admin" id="loginUser" required>
          </div>
          <div class="mb-4">
            <label class="form-label text-muted small fw-bold">PASSWORD</label>
            <input type="password" class="form-control form-control-admin" id="loginPass" required>
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2">
            Log In <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
    <div id="adminToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastText"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('adminToken') === 'saivedha-session-token-9440635761') {
        window.location.href = 'admin-price.html';
        return;
      }

      const adminToast = new bootstrap.Toast(document.getElementById('adminToast'));
      const toastText = document.getElementById('toastText');

      function showToast(text, isError = false) {
        toastText.textContent = text;
        const toastEl = document.getElementById('adminToast');
        toastEl.className = isError 
          ? 'toast align-items-center text-white bg-danger border-0' 
          : 'toast align-items-center text-white bg-success border-0';
        adminToast.show();
      }

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;
        
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (data.success) {
            localStorage.setItem('adminToken', data.token);
            window.location.href = 'admin-price.html';
          } else {
            showToast(data.error || 'Incorrect Credentials', true);
          }
        } catch (err) {
          showToast('Connection to server failed', true);
        }
      });
    });
  </script>
</body>
</html>
